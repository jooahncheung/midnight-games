<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cobalt Games | Surface</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <aside class="sidebar">
      <div class="side-logo">M</div>

      <nav class="side-nav">
        <a href="#gameSearch" class="active" title="Home"
          ><i data-lucide="home"></i
        ></a>
        <a href="#trending" title="Trending"><i data-lucide="flame"></i></a>
        <a href="#apps" title="Apps"><i data-lucide="layout-grid"></i></a>
      </nav>

      <div class="sidebar-footer">
        <button onclick="panic()" title="PANIC" class="panic-btn">
          <i data-lucide="shield-alert"></i>
        </button>

        <p
          class="section-label"
          style="font-size: 0.5rem; margin: 15px 0 10px 0; opacity: 0.5"
        >
          CLOAK
        </p>
        <div class="cloak-options">
          <button onclick="applyCloak('docs')" title="Google Docs">
            <i data-lucide="file-text"></i>
          </button>
          <button onclick="applyCloak('classroom')" title="Google Classroom">
            <i data-lucide="graduation-cap"></i>
          </button>
          <button onclick="applyCloak('drive')" title="Google Drive">
            <i data-lucide="hard-drive"></i>
          </button>
          <button onclick="applyCloak('google')" title="Google Search">
            <i data-lucide="search"></i>
          </button>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <nav class="top-nav">
        <div class="search-wr apper">
          <input
            type="text"
            id="gameSearch"
            placeholder="Search for Supercars, Slope, etc..."
          />
        </div>
      </nav>

      <header class="hero">
        <h1 class="title-main">COBALT GAMES</h1>

        <p class="role-subtitle"></p>
        <div class="desc-container">
          <p class="fading-desc">
            Immersive unblocked gaming. No limits, just pure fun!
          </p>
        </div>
      </header>
      <nav class="category-nav">
        <button class="cat-btn active" onclick="filterByCategory('all')">
          All
        </button>
        <button class="cat-btn" onclick="filterByCategory('Trending')">
          Trending 🔥
        </button>

        <button class="cat-btn" onclick="filterByCategory('Action')">
          Action 👊
        </button>
        <button class="cat-btn" onclick="filterByCategory('Horror')">
          Horror 👻
        </button>
        <button class="cat-btn" onclick="filterByCategory('Cars')">
          Cars 🏎️
        </button>
        <button class="cat-btn" onclick="filterByCategory('Sports')">
          Sports ⚽
        </button>
        <button class="cat-btn" onclick="filterByCategory('Puzzle')">
          Puzzle 🧩
        </button>
        <button class="cat-btn" onclick="filterByCategory('FPS')">
          FPS 🔫
        </button>
        <button class="cat-btn" onclick="filterByCategory('TowerDefense')">
          Defense 🏰
        </button>
        <button class="cat-btn" onclick="filterByCategory('IO')">
          IO Games 🌐
        </button>
        <button class="cat-btn" onclick="filterByCategory('Casino')">
          Casino 🃏
        </button>
        <button class="cat-btn" onclick="filterByCategory('Clicker')">
          Clicker 🖱️
        </button>

        <button class="cat-btn" onclick="filterByCategory('Surface')">
          Surface 🌊
        </button>
        <button class="cat-btn" onclick="filterByCategory('Retro')">
          Retro 🕹️
        </button>
        <button class="cat-btn" onclick="filterByCategory('App')">
          Apps 📱
        </button>
      </nav>
      <section class="content-area" id="featured">
        <h2 class="section-label">Featured</h2>
        <div class="bento-grid" id="featuredGrid"></div>
      </section>

      <section class="content-area" id="trending">
        <h2 class="section-label">
          Trending Now <span class="glow-text">🔥</span>
        </h2>

        <div class="trending-wrapper" id="trendingGrid"></div>
      </section>

      <section class="content-area" id="apps">
        <h2 class="section-label">Apps <span class="glow-text">📱</span></h2>

        <div class="bento-grid" id="appsGrid"></div>
      </section>
    </main>

    <script src="assets/js/render.js"></script>
    <script src="assets/js/core.js"></script>
  </body>
</html>
